components:
  schemas:
    health.StatusResponse:
      description: Response body shared by /health and /ready.
      properties:
        status:
          example: ok
          type: string
      type: object
externalDocs:
  description: ""
  url: ""
info:
  description: |-
    Backend API for ASL Core. Operational endpoints
    (/health, /ready) are intentionally unversioned - they
    must stay stable for load balancers/orchestrators
    across API versions. Business/resource endpoints, once
    added, will live under /api/v1.
  title: ASL Core API
  version: 0.1.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: Always returns 200 while the process is running. Does not check
        dependencies.
      operationId: healthCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health.StatusResponse'
          description: process is alive
      summary: Liveness check
      tags:
      - health
  /ready:
    get:
      description: Returns 200 if dependencies (currently just the database) are reachable,
        503 otherwise. Dependency checks have a 2s timeout. The underlying error is
        logged server-side, never returned to the client.
      operationId: readinessCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health.StatusResponse'
          description: dependencies are reachable
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health.StatusResponse'
          description: a dependency is unreachable
      summary: Readiness check
      tags:
      - health
servers:
- url: /
tags:
- description: Operational liveness/readiness endpoints. Unversioned by design.
  name: health
