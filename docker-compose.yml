services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asl_core
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      HTTP_ADDR: :8080
      LOGGER_LEVEL: info
      LOGGER_FORMAT: console
      DATABASE_DSN: postgres://postgres:postgres@postgres:5432/asl_core?sslmode=disable
      DATABASE_MAX_OPEN_CONNS: 10
      DATABASE_MAX_CONN_LIFETIME: 1h
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
