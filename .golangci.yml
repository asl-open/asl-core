version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - exptostd
    - gosec
    - gocritic
    - intrange
    - misspell
    - nilerr
    - nilnil
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
run:
  timeout: 10m
  allow-parallel-runners: true
  go: "1.26"
  tests: true
severity:
  default: error
output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
      colors: true
      path: stderr
  show-stats: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/asl-open/asl-core
